name: mad_project_test
description: A Online Food ordering App built using Flutter. Test Project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/icon.png"
  adaptive_icon_foreground: "images/icon.png"
  adaptive_icon_background: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - images/
    - images/Subway/
    - images/BurgerKing/
    - images/KFC/
    - images/LJS/
    - images/Mcdonalds/
    - images/Pizzahut/